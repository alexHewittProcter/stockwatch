name: stockwatch
description: A Flutter desktop app for watching stocks with real-time data streaming.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # HTTP & WebSocket
  dio: ^5.4.0
  web_socket_channel: ^2.4.0
  
  # Database
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # Charts
  fl_chart: ^0.66.0
  candlesticks: ^2.1.0
  
  # Notifications
  flutter_local_notifications: ^16.3.0
  
  # UI
  flutter_staggered_grid_view: ^0.7.0
  reorderables: ^0.6.0
  
  # Crypto
  crypto: ^3.0.3
  
  # JSON
  json_annotation: ^4.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  drift_dev: ^2.14.0
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_local_notifications:
  enable_selector: true